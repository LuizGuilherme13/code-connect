services:
  postgres:
    image: postgres:16-alpine
    container_name: code-connect-db
    environment:
      POSTGRES_USER: codeconnect
      POSTGRES_PASSWORD: codeconnect
      POSTGRES_DB: codeconnect
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
